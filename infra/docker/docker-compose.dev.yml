# Arquivo docker-compose alternativo para desenvolvimento
# Use este arquivo se quiser rodar o frontend/backend fora do Docker
# e apenas o PostgreSQL no Docker

services:
  postgis:
    image: postgis/postgis:15-3.4
    container_name: osm-postgis-dev
    environment:
      POSTGRES_DB: osm
      POSTGRES_USER: osm
      POSTGRES_PASSWORD: osm
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osm -d osm"]
      interval: 10s
      timeout: 5s
      retries: 10

  nominatim:
    image: mediagis/nominatim:4.3
    container_name: osm-nominatim
    ports:
      - "8080:8080"

    environment:
      PBF_PATH: /data/sudeste-260306.osm.pbf

    volumes:
      - ../maps:/data
